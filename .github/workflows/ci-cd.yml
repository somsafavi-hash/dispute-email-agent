name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  ci:
    name: Test, lint, and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Build application
        run: npm run build

  deploy-preview:
    name: Deploy preview
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Check Vercel secrets
        id: vercel-secrets
        run: |
          if [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ] && [ -n "$VERCEL_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.vercel-secrets.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.vercel-secrets.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: npm ci

      - name: Pull Vercel preview environment
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: npx --yes vercel@latest pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Vercel preview artifact
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: npx --yes vercel@latest build --token="$VERCEL_TOKEN"

      - name: Deploy Vercel preview
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: npx --yes vercel@latest deploy --prebuilt --token="$VERCEL_TOKEN"

      - name: Skip preview deploy
        if: steps.vercel-secrets.outputs.configured != 'true'
        run: echo "Skipping preview deploy because Vercel secrets are not configured."

  deploy-production:
    name: Deploy production
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Check Vercel secrets
        id: vercel-secrets
        run: |
          if [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ] && [ -n "$VERCEL_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.vercel-secrets.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.vercel-secrets.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: npm ci

      - name: Pull Vercel production environment
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: npx --yes vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel production artifact
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: npx --yes vercel@latest build --prod --token="$VERCEL_TOKEN"

      - name: Deploy Vercel production
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: npx --yes vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Skip production deploy
        if: steps.vercel-secrets.outputs.configured != 'true'
        run: echo "Skipping production deploy because Vercel secrets are not configured."
