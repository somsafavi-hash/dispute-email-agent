name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: ${{ vars.AWS_ECR_REPOSITORY || 'dispute-email-agent' }}
  ECR_STACK_NAME: ${{ vars.AWS_ECR_STACK_NAME || 'dispute-email-agent-ecr' }}
  APP_STACK_NAME: ${{ vars.AWS_APP_STACK_NAME || 'dispute-email-agent-production' }}

jobs:
  ci:
    name: Test, lint, and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Build application
        run: npm run build

  deploy-production:
    name: Deploy production to AWS
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    env:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_VPC_ID: ${{ vars.AWS_VPC_ID }}
      AWS_PUBLIC_SUBNET_IDS: ${{ vars.AWS_PUBLIC_SUBNET_IDS }}
      AWS_APP_SUBNET_IDS: ${{ vars.AWS_APP_SUBNET_IDS }}
      AWS_CERTIFICATE_ARN: ${{ vars.AWS_CERTIFICATE_ARN }}
      TALONFLAME_ASANA_ACCESS_TOKEN_SECRET_ARN: ${{ secrets.TALONFLAME_ASANA_ACCESS_TOKEN_SECRET_ARN }}
      TALONFLAME_ASANA_PROJECT_GID: ${{ vars.TALONFLAME_ASANA_PROJECT_GID }}
      TALONFLAME_ASANA_WORKSPACE_GID: ${{ vars.TALONFLAME_ASANA_WORKSPACE_GID }}
      MEOWTH_ASANA_APPROVAL_LAMBDA_ARN: ${{ vars.MEOWTH_ASANA_APPROVAL_LAMBDA_ARN }}
      MEOWTH_APPROVAL_TOKEN_LOOKUP_URL: ${{ vars.MEOWTH_APPROVAL_TOKEN_LOOKUP_URL }}
      MEOWTH_APPROVAL_TOKEN_LOOKUP_BEARER_TOKEN_SECRET_ARN: ${{ secrets.MEOWTH_APPROVAL_TOKEN_LOOKUP_BEARER_TOKEN_SECRET_ARN }}
      CHATOT_MANAGE_COMMUNICATION_ACTIVITY_URL: ${{ vars.CHATOT_MANAGE_COMMUNICATION_ACTIVITY_URL }}
      CHATOT_STEP_FUNCTIONS_CONNECTION_ARN: ${{ vars.CHATOT_STEP_FUNCTIONS_CONNECTION_ARN }}
      ORANGURU_ASSEMBLE_COMMUNICATION_RUNTIME_URL: ${{ vars.ORANGURU_ASSEMBLE_COMMUNICATION_RUNTIME_URL }}
      ORANGURU_BEARER_TOKEN_SECRET_ARN: ${{ secrets.ORANGURU_BEARER_TOKEN_SECRET_ARN }}

    steps:
      - name: Check required AWS configuration
        run: |
          missing=0
          for name in \
            AWS_ROLE_ARN \
            AWS_VPC_ID \
            AWS_PUBLIC_SUBNET_IDS \
            AWS_APP_SUBNET_IDS \
            AWS_CERTIFICATE_ARN \
            TALONFLAME_ASANA_ACCESS_TOKEN_SECRET_ARN \
            TALONFLAME_ASANA_PROJECT_GID \
            MEOWTH_ASANA_APPROVAL_LAMBDA_ARN \
            MEOWTH_APPROVAL_TOKEN_LOOKUP_URL \
            CHATOT_MANAGE_COMMUNICATION_ACTIVITY_URL \
            CHATOT_STEP_FUNCTIONS_CONNECTION_ARN
          do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for AWS production deploy"
              missing=1
            fi
          done
          exit "$missing"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy ECR repository stack
        run: |
          aws cloudformation deploy \
            --stack-name "$ECR_STACK_NAME" \
            --template-file infra/aws/ecr.yml \
            --parameter-overrides RepositoryName="$ECR_REPOSITORY"

      - name: Resolve ECR repository URI
        id: ecr
        run: |
          repository_uri="$(aws cloudformation describe-stacks \
            --stack-name "$ECR_STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='RepositoryUri'].OutputValue" \
            --output text)"
          echo "repository-uri=$repository_uri" >> "$GITHUB_OUTPUT"
          echo "image-uri=$repository_uri:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push container image
        run: |
          docker build --pull --tag "${{ steps.ecr.outputs.image-uri }}" .
          docker push "${{ steps.ecr.outputs.image-uri }}"

      - name: Deploy application stack
        run: |
          aws cloudformation deploy \
            --stack-name "$APP_STACK_NAME" \
            --template-file infra/aws/app.yml \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              AppName=dispute-email-agent \
              EnvironmentName=production \
              ImageUri="${{ steps.ecr.outputs.image-uri }}" \
              VpcId="$AWS_VPC_ID" \
              PublicSubnetIds="$AWS_PUBLIC_SUBNET_IDS" \
              AppSubnetIds="$AWS_APP_SUBNET_IDS" \
              CertificateArn="$AWS_CERTIFICATE_ARN" \
              AsanaAccessTokenSecretArn="$TALONFLAME_ASANA_ACCESS_TOKEN_SECRET_ARN" \
              AsanaProjectGid="$TALONFLAME_ASANA_PROJECT_GID" \
              AsanaWorkspaceGid="$TALONFLAME_ASANA_WORKSPACE_GID" \
              MeowthAsanaApprovalLambdaArn="$MEOWTH_ASANA_APPROVAL_LAMBDA_ARN" \
              MeowthApprovalTokenLookupUrl="$MEOWTH_APPROVAL_TOKEN_LOOKUP_URL" \
              MeowthApprovalTokenLookupBearerTokenSecretArn="$MEOWTH_APPROVAL_TOKEN_LOOKUP_BEARER_TOKEN_SECRET_ARN" \
              ChatotManageCommunicationActivityUrl="$CHATOT_MANAGE_COMMUNICATION_ACTIVITY_URL" \
              ChatotConnectionArn="$CHATOT_STEP_FUNCTIONS_CONNECTION_ARN" \
              OranguruAssembleCommunicationRuntimeUrl="$ORANGURU_ASSEMBLE_COMMUNICATION_RUNTIME_URL" \
              OranguruBearerTokenSecretArn="$ORANGURU_BEARER_TOKEN_SECRET_ARN"
